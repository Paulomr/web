<nav class="notch" aria-label="Navegación principal">
  <a class="brand" routerLink="/">
    <img class="brand-logo" src="fotos/bearnie-logo.webp" alt="Bearnie, logo de Crunchy Munch" />
    <span class="brand-name">CRUNCHY MUNCH</span>
  </a>

  <!-- Menú estilo "gradient menu": círculo con icono que se expande a
       píldora con gradiente y brillo al pasar el mouse (o si está activo). -->
  <div class="links">
    <a class="gitem" style="--gf:#f078b8;--gt:#e84e9c" routerLink="/"
       routerLinkActive="activa" [routerLinkActiveOptions]="{ exact: true }" aria-label="Inicio">
      <svg class="gicon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 10 10 3.5 17 10" />
        <path d="M5 8.8V16h10V8.8" />
        <path d="M8.4 16v-4.2h3.2V16" />
      </svg>
      <span class="gtxt">Inicio</span>
    </a>
    <a class="gitem" style="--gf:#ffb56b;--gt:#ff7e5f" routerLink="/catalogo"
       routerLinkActive="activa" aria-label="Catálogo">
      <svg class="gicon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true">
        <circle cx="10" cy="10" r="6.6" />
        <circle cx="7.6" cy="8.2" r="0.9" fill="currentColor" stroke="none" />
        <circle cx="12.4" cy="7.6" r="0.9" fill="currentColor" stroke="none" />
        <circle cx="9.4" cy="12.6" r="0.9" fill="currentColor" stroke="none" />
        <circle cx="13" cy="11.8" r="0.9" fill="currentColor" stroke="none" />
      </svg>
      <span class="gtxt">Catálogo</span>
    </a>
    <a class="gitem" style="--gf:#7cd4ea;--gt:#4aa8e8" routerLink="/galeria"
       routerLinkActive="activa" aria-label="Galería">
      <svg class="gicon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="5.4" width="14" height="10.2" rx="2.4" />
        <path d="M7.2 5.4 8.4 3.6h3.2l1.2 1.8" />
        <circle cx="10" cy="10.4" r="2.6" />
      </svg>
      <span class="gtxt">Galería</span>
    </a>
    <a class="gitem magica" style="--gf:#c084fc;--gt:#f472b6" routerLink="/minijuegos"
       routerLinkActive="activa" aria-label="Juegos">
      <svg class="gicon" viewBox="0 0 20 20" fill="currentColor" stroke="none" aria-hidden="true">
        <path d="M10 2.2 11.7 8l5.8 2-5.8 2L10 17.8 8.3 12l-5.8-2 5.8-2z" />
        <path d="M15.8 2.6l.7 2.1 2.1.7-2.1.7-.7 2.1-.7-2.1-2.1-.7 2.1-.7z" opacity="0.7" />
      </svg>
      <span class="gtxt">Juegos</span>
    </a>
    <a class="gitem" style="--gf:#f6c545;--gt:#e8a11c" routerLink="/fidelidad"
       routerLinkActive="activa" aria-label="Fidelidad">
      <svg class="gicon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2.5" y="5" width="15" height="10" rx="2.4" />
        <path d="M2.5 9h15" />
        <path d="M6 12.4h3" />
      </svg>
      <span class="gtxt">Fidelidad</span>
    </a>

    <!-- Chip de cuenta (con sesión) o botón Entrar (sin sesión). -->
    @if (cuenta.registrado()) {
      <button type="button" class="cuenta-notch" (click)="cuenta.abrir()"
        [attr.aria-label]="'Cuenta de ' + cuenta.primerNombre()" [attr.title]="cuenta.primerNombre()">
        <span class="cuenta-ini">{{ cuenta.primerNombre().charAt(0) }}</span>
      </button>
    } @else {
      <button type="button" class="login-notch" (click)="cuenta.abrir('login')" aria-label="Iniciar sesión" title="Iniciar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="8.5" r="3.6" />
          <path d="M5.5 19.2a6.5 6.5 0 0 1 13 0" />
        </svg>
      </button>
    }

    <!-- Carrito integrado en el notch. -->
    <button type="button" class="carrito-notch" (click)="carrito.abierto.set(true)" aria-label="Abrir carrito">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 6h2l2.4 10.2a1.6 1.6 0 0 0 1.56 1.3h6.9a1.6 1.6 0 0 0 1.56-1.22L20.4 9H7" />
        <circle cx="10.6" cy="20.4" r="1.3" fill="currentColor" stroke="none" />
        <circle cx="17.4" cy="20.4" r="1.3" fill="currentColor" stroke="none" />
      </svg>
      @if (carrito.unidades() > 0) {
        <span class="carrito-num">{{ carrito.unidades() }}</span>
      }
    </button>
  </div>
</nav>
